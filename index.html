<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
      rel="stylesheet"
    />
    <script src="./renderJobs.js" defer></script>
    <script src="./script.js" defer></script>
    <title>Devjobs</title>
  </head>
  <body>
    <header>
      <img src="./assets/desktop/logo.svg" alt="Site Logo" class="site-logo" />

      <div class="theme-container">
        <img src="./assets/desktop/icon-sun.svg" alt="" />
        <button class="theme-toggle" aria-label="Toggle dark mode">
          <span class="toggle-circle"></span>
        </button>
        <img src="./assets/desktop/icon-moon.svg" alt="" />
      </div>
    </header>
    <main>
      <form action="" class="search-bar">
        <div class="search-wrapper">
          <img
            src="./assets/desktop/icon-search.svg"
            alt=""
            class="search-logo"
          />
          <input
            type="search"
            placeholder="Filter by title..."
            class="search-input"
            aria-label="Filter by title"
          />
        </div>

        <div class="location-wrapper">
          <img
            src="./assets/desktop/icon-location.svg"
            alt=""
            class="location-logo"
          />
          <input
            type="text"
            placeholder="Filter by location..."
            class="location-input"
            aria-label="Filter by location"
          />

          <button
            type="button"
            class="location-btn"
            aria-label="Filter Location"
          >
            <img
              src="./assets/mobile/icon-filter.svg"
              alt=""
              aria-hidden="true"
            />
          </button>
        </div>

        <div class="button-wrapper">
          <input
            type="checkbox"
            id="full-time"
            name="full-time"
            class="full-time checkbox"
          />
          <label for="full-time" class="full-time"
            >Full Time <span class="d-only">Only</span></label
          >
          <button type="submit" class="search-btn--txt">Search</button>
          <button type="submit" class="search-btn" aria-label="Search Jobs">
            <img
              src="./assets/desktop/icon-search.svg"
              alt=""
              class="search-icon"
              aria-hidden="true"
            />
          </button>
        </div>
      </form>

      <div class="job-container">
        <p class="loading">Loading jobs...</p>
      </div>

      <button type="button" class="load-btn" id="loadMoreBtn">Load More</button>
    </main>
    <div class="modal-container">
      <div class="modal">
        <div class="location-modal-wrapper">
          <img
            src="./assets/desktop/icon-location.svg"
            alt=""
            class="location-logo-modal"
          />
          <input
            type="text"
            placeholder="Filter by location"
            class="location-input-modal"
            aria-label="Filter by location"
          />
        </div>
        <div class="fulltime-wrapper">
          <input
            type="checkbox"
            id="full-time"
            name="full-time"
            class="ft-checkbox"
          />
          <label for="full-time" class="ft-modaltxt"
            >Full Time Only</span></label
          >
          <button type="submit" class="search-btn-modal">Search</button>
        </div>
      </div>
    </div>
  </body>
</html>
